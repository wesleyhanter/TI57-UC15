<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplos de JavaScript</title>
</head>
<body id="corpo">
    
    <h1>Exemplos de JavaScript</h1>
    <h2>Alterar o conteúdo de um elemento</h2>

    <p id="mensagem01"></p>

    <h3>Via seletor Script</h3>
    <script>
        document.getElementById("mensagem01").innerText = "Olá, mundo!";
    </script>

    <h3>Via atributo onclick</h3>
    <button onclick="document.getElementById('mensagem01').innerText = 'Olá, mundo via onclick!';">Clique aqui</button>

    <h3>Via atributo função</h3>
    <button onclick="alterarMensagem()">Clique aqui</button>

    <script>
        function alterarMensagem() {
            document.getElementById("mensagem01").innerText = "Olá, mundo via função!";
        }
    </script>

    <h3>Via arquivo externo</h3>
    <button onclick="alterarMensagemExterna()">Clique aqui</button>

    <script src="script.js"></script>
    
    <div style="display: flex; gap: 20px;">
        <main>

            <h2>Alterando um atributo</h2>
            <button onclick="Liga()">Liga</button>
            <img src="Midias/off.gif" alt="Lâmpada" id="lamp">
            
            <button onclick="Desliga()">Desliga</button>
            <script>
                function Liga() {
                    document.getElementById("lamp").src = "Midias/on.gif";
                }
                
                function Desliga() {
                    document.getElementById("lamp").src = "Midias/off.gif";
                }
                </script>
</main>

    <aside>
    <h3>Ligar e Desligar com Variável</h3>
    
    <script>
        let lampLigada = false;
        function alternarLampada() {
        const lamp = document.getElementById("lamp");
        if (lampLigada) {
            lamp.src = "Midias/off.gif";
        } else {
            lamp.src = "Midias/on.gif";
        }
        lampLigada = !lampLigada;
    }
</script>
<button onclick="alternarLampada()">Liga/Desliga</button>

</aside>
</div>

<h2>Alterar a formatação</h2>
<button onclick="formata()">Vermelho</button>
<button onclick="formata2()">Azul</button>
<button onclick="formata3()">Verde</button>
<script>
    function formata() {
        document.getElementById("mensagem01").style.color = "red";
        document.getElementById("mensagem01").style.backgroundColor = "black";

    }

    function formata2() {
        document.getElementById("mensagem01").style.color = "blue";
        document.getElementById("mensagem01").style.backgroundColor = "grey";
    }
    function formata3() {
        document.getElementById("mensagem01").style.color = "green";
        document.getElementById("mensagem01").style.backgroundColor = "yellow";
    }
</script>

<h3>Modo noturno</h3>
<button onclick="alternarModoEscuro()">Ativar/Desativar Modo Escuro</button>
<script>
    let escuroAtivo = false;
    function alternarModoEscuro() {
        if (!escuroAtivo) {
            document.body.style.backgroundColor = "black";
            document.body.style.color = "white";
        } else {
            document.body.style.backgroundColor = "";
            document.body.style.color = "";
        }
        escuroAtivo = !escuroAtivo;
    }
</script>
<script>
    function modoEscuro() {
        document.body.style.backgroundColor = "black";
        document.body.style.color = "white";
    }
</script>

<h3>Modo noturno</h3>
<button id="escuroBtn" onclick="escuro()">Tema escuro</button>
<button id="claroBtn" style="display: none;" onclick="claro()">Tema claro</button>
<script>
    function escuro() {
        document.getElementById("corpo").style.backgroundColor = "black";
        document.getElementById("corpo").style.color = "white";
        document.getElementById("escuroBtn").style.display = "none";
        document.getElementById("claroBtn").style.display = "inline-block";
    }

    function claro() {
        document.getElementById("corpo").style.backgroundColor = "";
        document.getElementById("corpo").style.color = "";
        document.getElementById("escuroBtn").style.display = "inline-block";
        document.getElementById("claroBtn").style.display = "none";
    }
</body>
</html>
