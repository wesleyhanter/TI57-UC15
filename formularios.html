<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>

        h2 {
            text-align: center;
            margin-bottom: 5px;
        }

        p {
            text-align: center;
            font-size: 14px;
            color: #555;
            margin-bottom: 20px;
        }

        fieldset{
            border: 1px solid rgb(0, 0, 0);
            margin-bottom: 20px;
            padding: 20px;
            /* border: none;
            margin-bottom: 20px; */
            
        }
         form {
            max-width: 500px;
            margin: 40px auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }


        select, label, textarea{
            width: 100%;
            display: inline-block;

        }
        label[for="aluno"], label[for=professor]{
         display: inline-flex;   
         width: 100%;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
         input[for="radio"], input[for=checkbox]{
               display: flex;

         }

            input[type="submit"], input[type="reset"]{
                width: auto;
                padding: 10px 20px;
                background-color: #007BFF;
                color: white;
                border: none;
                border-radius: 5px;
                cursor: pointer;
                
    
            }
            span {
                color: red;
                font-size: 12px;
        }
        .campo-senha {
    position: relative;
    width: 100%;
}

.campo-senha input {
    width: 100%;
    /* padding-right: 35px; espaço pro ícone */
}

.campo-senha i {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #555;
}

        



    </style>
    <!-- <script>
        function verSenha(){
            document.getElementById("senha").type = "text";
        }
    </script> -->
    <script>
                function verSenha() {
                    let senha = document.getElementById("senha");
                    let olho = document.getElementById("olho");
                    if (senha.type === "password"){
                        senha.type = "text";
                        olho.classList.replace("bi-eye", "bi-eye-slash")
                    } else {
                        senha.type = "password";
                        olho.classList.replace("bi-eye-slash", "bi-eye")
                    }
                    
                }
            
                function senhaForte (){
                let senha = document.getElementById("senha").value;
                let testNum = /^(?=.*\d)/;
                let testMin = /^(?=.*[a-z])/;
                let testMai = /^(?=.*[A-Z])/;
                let testEsp = /^(?=.*[@$!%*#?&])/;
                let testTam = /^.{8,}$/;
                let mensagem = "";
                 if (!senha.match(testNum)){
                    mensagem += "A senha deve conter pelo menos um número.";
                }  if (!senha.match(testMin)){
                    mensagem += "<br>A senha deve conter pelo menos uma letra minúscula.";
                }  if (!senha.match(testMai)){
                    mensagem += "<br>A senha deve conter pelo menos uma letra maiúscula.";
                }  if (!senha.match(testEsp)){
                    mensagem += "<br>A senha deve conter pelo menos um caractere especial.";
                }  if (!senha.match(testTam)){
                    mensagem += "<br>A senha deve ter pelo menos 8 caracteres.";
                }
                document.getElementById("mensagem-senha").innerHTML = mensagem;
                
                if (mensagem == ""){
                    document.getElementById("senha2").disabled = false;
                } else {
                    document.getElementById("senha2").disabled = true;
                }
            }

                function senhaIgual() {
                    let senha = document.getElementById("senha").value;
                    let senha2 = document.getElementById("senha2").value;
                    let mensagem = "";
                    if (senha !== senha2) {
                        mensagem = "As senhas não coincidem.";
                    }
                    document.getElementById("mensagem-senha2").innerHTML = mensagem;
                
                if (mensagem == ""){
                    document.getElementById("enviar").disabled = false;
                } else {
                    document.getElementById("enviar").disabled = true;
                }
            }
            
            </script>
            
</head>
<body>
    <form action="https://jkorpela.fi/cgi-bin/echo.cgi" method="post" target="_blank" >
        <h2>Formulário de Inscrição</h2>
        <p>Preencha os dados abaixo para se inscrever</p>
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome:</label>
            <input type="text" name="nome" id="nome" placeholder="Nome">
            <br>
            <label for="email">Email:</label>
            <input type="email" name="email" id="email" placeholder="Email">
            <br>
            <input type="radio" name="tipo" id="aluno" value="aluno">
            <label for="aluno">Aluno</label>
            <input type="radio" name="tipo" id="professor" value="professor">
            <label for="professor">Professor</label>
            
        </fieldset>
        
        <fieldset>
            <legend>Endereço</legend>
            <label for="cep">CEP:</label>
            <input type="text" name="cep" id="cep" placeholder="CEP">
            <br>
            <label for="rua">Rua:</label>
            <input type="text" name="rua" id="rua" placeholder="Rua">
            <br>
            <label for="cidade">Cidade:</label>
            <input type="text" name="cidade" id="cidade" placeholder="Cidade">
        </fieldset>
        
        <fieldset>
            <legend>Dados de Acesso</legend>
            <label for="senha">Senha:</label>
            <!-- <input onkeyup="senhaForte()" type="password" name="senha" id="senha" placeholder="Senha">
            <button type="button" onclick="verSenha()" id="olho" class="bi bi-eye"></button> -->
            <div class="campo-senha">
            <input onkeyup="senhaForte()" type="password" name="senha" id="senha" placeholder="Senha">
            <i onclick="verSenha()" id="olho" class="bi bi-eye"></i>
            </div>
            <p>
                <span id="mensagem-senha"></span>
            </p>

            <label for="senha2">Confirme a senha:</label>
            <input onkeyup="senhaIgual()" type="password" name="senha2" id="senha2" placeholder="Confirme a senha" disabled>
            <p>
                <span id="mensagem-senha2"></span>
            </p>

            
  
        </fieldset>

        <fieldset>
            <legend>Informações Adicionais</legend>
            <br>
            <select name="nivel" id="nivel" required>
                <option value="">Escolha seu nivel</option>
                <option value="Iniciante">Iniciante</option>
                <option value="Intermediario">Intermediário</option>
                <option value="Avancado">Avançado</option>
            </select>
            <br>
            <textarea name="msg" id="msg" placeholder="Escreva sua mensagem aqui..."></textarea>
            <br>
        </fieldset>
        <input type="checkbox" name="promo" id="promo" value="sim">
        <label for="promo">Desejo receber promoções</label>




        <br>
        <input type="reset" value="Limpar">
        <input type="submit" value="Enviar" disabled id="enviar">
         
   
    </form>

</body>
</html>
